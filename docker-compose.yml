version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: pycostaudit-postgres
    environment:
      POSTGRES_DB: pycostaudit
      POSTGRES_USER: pycostaudit
      POSTGRES_PASSWORD: pycostaudit
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pycostaudit"]
      interval: 10s
      timeout: 5s
      retries: 5

  # FastAPI Backend
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: pycostaudit-backend
    environment:
      DATABASE_URL: postgresql://pycostaudit:pycostaudit@postgres:5432/pycostaudit
      JAEGER_ENABLED: "true"
      JAEGER_HOST: jaeger
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      jaeger:
        condition: service_started
    volumes:
      - ./pycostaudit:/app/pycostaudit
    command: uvicorn pycostaudit.dashboard.app:app --host 0.0.0.0 --port 8000 --reload

  # Next.js Frontend
  frontend:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    container_name: pycostaudit-frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./dashboard:/app

  # Jaeger Tracing
  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: pycostaudit-jaeger
    environment:
      COLLECTOR_ZIPKIN_HOST_PORT: :9411
    ports:
      - "6831:6831/udp"  # Jaeger collector
      - "16686:16686"    # Jaeger UI
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:14268/collector/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Prometheus Metrics
  prometheus:
    image: prom/prometheus:latest
    container_name: pycostaudit-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'

  # Grafana Dashboards
  grafana:
    image: grafana/grafana:latest
    container_name: pycostaudit-grafana
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_SECURITY_ADMIN_USER: admin
    ports:
      - "3001:3000"
    depends_on:
      - prometheus
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources

volumes:
  postgres_data:
  prometheus_data:
  grafana_data:

networks:
  default:
    name: pycostaudit-network
