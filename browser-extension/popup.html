<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PyCostAudit - Cost Tracking</title>
    <link rel="stylesheet" href="popup.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1>💰 PyCostAudit</h1>
            <p class="subtitle">Real-time Claude Code cost tracking</p>
        </div>

        <!-- Status -->
        <div class="section status">
            <h2>📊 Today's Costs</h2>
            <div class="stat-card">
                <div class="stat">
                    <div class="label">Total Cost</div>
                    <div class="value" id="todayCost">$0.0000</div>
                </div>
                <div class="stat">
                    <div class="label">Operations</div>
                    <div class="value" id="todayOps">0</div>
                </div>
                <div class="stat">
                    <div class="label">Tokens</div>
                    <div class="value" id="todayTokens">0</div>
                </div>
            </div>
        </div>

        <!-- Provider Breakdown -->
        <div class="section breakdown">
            <h2>🤖 Cost by Provider</h2>
            <div id="providerBreakdown" class="breakdown-list">
                <div class="loading">Loading...</div>
            </div>
        </div>

        <!-- Weekly Forecast -->
        <div class="section forecast">
            <h2>📈 Weekly Forecast</h2>
            <div class="forecast-stat">
                <div>
                    <span class="label">Daily Average:</span>
                    <span id="dailyAvg">$0.00</span>
                </div>
                <div>
                    <span class="label">Weekly Est:</span>
                    <span id="weeklyEst">$0.00</span>
                </div>
                <div>
                    <span class="label">Monthly Est:</span>
                    <span id="monthlyEst">$0.00</span>
                </div>
            </div>
        </div>

        <!-- Alerts -->
        <div class="section alerts" id="alertsSection" style="display:none;">
            <h2>⚠️ Alerts</h2>
            <div id="alertsList" class="alerts-list"></div>
        </div>

        <!-- Actions -->
        <div class="section actions">
            <button id="refreshBtn" class="btn btn-primary">🔄 Refresh</button>
            <button id="openDashboardBtn" class="btn btn-secondary">📊 Open Dashboard</button>
        </div>

        <!-- Footer -->
        <div class="footer">
            <small id="lastUpdate">Last updated: -</small>
        </div>
    </div>

    <script src="popup.js"></script>
</body>
</html>
